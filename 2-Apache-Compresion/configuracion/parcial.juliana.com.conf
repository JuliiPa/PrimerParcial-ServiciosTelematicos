<VirtualHost *:80>
    ServerName parcial.juliana.com
    DocumentRoot /var/www/parcial.juliana.com

    <Directory /var/www/parcial.juliana.com>
        AllowOverride All
        Require all granted
    </Directory>

    ErrorLog ${APACHE_LOG_DIR}/parcial_error.log
    CustomLog ${APACHE_LOG_DIR}/parcial_access.log combined
</VirtualHost>
